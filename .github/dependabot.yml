version: 2
# Dotfiles repo: the remaining package.json/lock files here are vendored from
# third-party tools (Raycast extensions) that manage their own dependencies.
# Empty updates disables Dependabot version-update PRs. NOTE: this does NOT
# silence Dependabot *alerts* -- those come from the dependency graph, which
# scans every manifest and cannot exclude paths. Alerts on vendored manifests
# must be dismissed manually (reason: "not_used") in the Security tab.
updates: []
